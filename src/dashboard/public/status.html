<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status — Aevix</title>
  <meta name="theme-color" content="#6C3AED">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <nav class="nav" id="nav"></nav>
  <main class="page container" style="max-width:800px">
    <div class="page-header" style="text-align:center"><h1>System <span style="color:var(--brand)">Status</span></h1><p>Real-time bot health monitoring</p></div>
    <div id="status-loading" class="loading-page"><div class="spinner"></div></div>
    <div id="status-content" class="hidden">
      <div class="card" style="text-align:center;padding:28px" id="status-badge"></div>
      <div class="grid grid-3 mt-24" id="status-stats"></div>
      <div class="grid grid-3 mt-16" id="status-extra"></div>
    </div>
  </main>
  <footer class="footer"><span>◆</span> Aevix</footer>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function loadStatus() {
      try {
        const s = await API.stats();
        const ok = s.status === "Operational";
        document.getElementById("status-badge").innerHTML = `
          <div class="tag ${ok?"tag-success":"tag-warn"}" style="font-size:.85rem;padding:6px 16px;margin-bottom:12px">${s.status}</div>
          <div style="color:var(--text-secondary);font-size:.85rem">Last checked: ${new Date().toLocaleTimeString()}</div>`;
        document.getElementById("status-stats").innerHTML = `
          <div class="card stat-card"><div class="stat-value">${App.formatNumber(s.servers||0)}</div><div class="stat-label">Servers</div></div>
          <div class="card stat-card"><div class="stat-value">${App.formatNumber(s.users||0)}</div><div class="stat-label">Users</div></div>
          <div class="card stat-card"><div class="stat-value">${s.commands||0}</div><div class="stat-label">Commands</div></div>`;
        document.getElementById("status-extra").innerHTML = `
          <div class="card stat-card"><div class="stat-value">${s.ping||0}<span style="font-size:.9rem;color:var(--text-muted)">ms</span></div><div class="stat-label">Ping</div></div>
          <div class="card stat-card"><div class="stat-value">${s.players||0}</div><div class="stat-label">Players</div></div>
          <div class="card stat-card"><div class="stat-value">${App.formatUptime(s.uptime||0)}</div><div class="stat-label">Uptime</div></div>`;
        document.getElementById("status-loading").classList.add("hidden");
        document.getElementById("status-content").classList.remove("hidden");
      } catch (err) {
        document.getElementById("status-loading").innerHTML = `<div style="text-align:center;color:var(--error)">Failed to load status</div>`;
      }
    }
    document.addEventListener("DOMContentLoaded", async () => { await App.init(); await loadStatus(); setInterval(loadStatus, 30000); });
  </script>
</body>
</html>
